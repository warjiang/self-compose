# version: '3'
services:
  opensearch-node1:
    image: ${REGISTRY:-docker.io}/opensearchproject/opensearch:3.2.0 # 使用最新稳定版
    container_name: opensearch-node1
    environment:
      - cluster.name=opensearch-cluster
      - node.name=opensearch-node1
      - discovery.type=single-node # 关键：单节点模式
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m" # 根据你的机器内存调整
      - plugins.security.disabled=false # 启用安全插件（推荐）
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch-data1:/usr/share/opensearch/data
    ports:
      - 9200:9200 # REST API
      - 9600:9600 # Performance Analyzer
    networks:
      - opensearch-net

  opensearch-dashboards:
    image: ${REGISTRY:-docker.io}/opensearchproject/opensearch-dashboards:3.2.0
    container_name: opensearch-dashboards
    ports:
      - 5601:5601
    environment:
      - 'OPENSEARCH_HOSTS=["https://opensearch-node1:9200"]'
      - "OPENSEARCH_SECURITY_AUTHENTICATION_TYPE=basicauth"
    networks:
      - opensearch-net
    depends_on:
      - opensearch-node1

volumes:
  opensearch-data1:

networks:
  opensearch-net: