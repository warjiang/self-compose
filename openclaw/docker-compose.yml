  OPENCLAW_PLUGINS_ENABLED: ${OPENCLAW_PLUGINS_ENABLED}
  # Tools config
  OPENCLAW_TOOLS_JSON: ${OPENCLAW_TOOLS_JSON}

services:
  openclaw-gateway:
    container_name: openclaw-gateway
    image: ${OPENCLAW_IMAGE}
    profiles:
      - core
      - minimal
      - all
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    # Optional: specify UID:GID for container (e.g. 1000:1000)
    # Defaults to root for init.sh to fix mounted volume permissions before dropping privileges
    user: ${OPENCLAW_RUN_USER:-0:0}
    environment: *openclaw-common-env
    volumes:
      - ${OPENCLAW_DATA_DIR}:/home/node/.openclaw
      # Use named volume to share extensions, ensuring tools container installed plugins are visible to main container
      - openclaw-extensions:/home/node/.openclaw/extensions
    ports:
      - "${OPENCLAW_GATEWAY_PORT}:18789"
      - "${OPENCLAW_BRIDGE_PORT}:18790"
    init: true
    restart: unless-stopped
    networks:
      - openclaw

  openclaw-installer:
    container_name: openclaw-installer
    image: ${OPENCLAW_IMAGE}
    profiles:
      - tools
    user: ${OPENCLAW_RUN_USER:-0:0}
    environment: *openclaw-common-env
    volumes:
      - ${OPENCLAW_DATA_DIR}:/home/node/.openclaw
      - openclaw-extensions:/home/node/.openclaw/extensions
    entrypoint: ["tail", "-f", "/dev/null"]
    init: true
    restart: 'no'
    ports: []
    stdin_open: true
    tty: true

  all-in-one-sandbox:
    container_name: all-in-one-sandbox
    image: enterprise-public-cn-beijing.cr.volces.com/vefaas-public/all-in-one-sandbox:latest
    security_opt:
      - seccomp=unconfined
    ports:
      - "8080:8080"
    restart: unless-stopped
    profiles:
      - addon
      - minimal
      - all

  clash:
    container_name: clash
    image: ${REGISTRY:-docker.io}/dreamacro/clash:latest
    ports:
      - "7890:7890"
      - "9090:9090"
    volumes:
      - ./clash-config:/root/.config/clash:rw
      - ./clash-ui:/ui
    networks:
      - openclaw
    restart: unless-stopped
    profiles:
      - addon
      - all

volumes:
  openclaw-extensions:

networks:
  openclaw: